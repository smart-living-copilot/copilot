services:
  copilot:
    build:
      context: ./copilot
      dockerfile: Dockerfile
    volumes:
      - ./copilot/copilot:/app/copilot:cached
      - ./copilot/tests:/app/tests:cached
    environment:
      LOG_LEVEL: "DEBUG"
    entrypoint: ["uvicorn", "copilot.server:app", "--host", "0.0.0.0", "--port", "8123", "--reload", "--reload-dir", "copilot"]

  chat-ui:
    build:
      context: ./chat-ui
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./chat-ui/src:/app/src:cached
      - ./chat-ui/public:/app/public:cached
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_POLL_INTERVAL_MS: "1000"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "1"

  code-executor:
    build:
      context: ./code-executor
      dockerfile: Dockerfile
      target: builder
    ports:
      - "8888:8888"
    volumes:
      - ./code-executor/code_executor:/app/code_executor:cached
    environment:
      LOG_LEVEL: "DEBUG"
      IDLE_TIMEOUT_SECONDS: "600"
    entrypoint: ["uvicorn", "code_executor.api:app", "--host", "0.0.0.0", "--port", "8888", "--reload", "--reload-dir", "code_executor"]

  job-runner:
    build:
      context: ./job-runner
      dockerfile: Dockerfile
    ports:
      - "8890:8890"
    volumes:
      - ./job-runner/job_runner:/app/job_runner:cached
    environment:
      LOG_LEVEL: "DEBUG"
    entrypoint: ["uvicorn", "job_runner.api:app", "--host", "0.0.0.0", "--port", "8890", "--reload", "--reload-dir", "job_runner"]

  data-replay:
    build:
      context: ./data-replay
      dockerfile: Dockerfile
    volumes:
      - ./data-replay/replay_server.py:/app/replay_server.py:cached
      - ./data-replay/td_generator.py:/app/td_generator.py:cached
      - ./data-replay:/app/data:ro
    entrypoint: ["uvicorn", "replay_server:app", "--host", "0.0.0.0", "--port", "9000", "--reload"]
